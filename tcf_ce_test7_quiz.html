
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
#app{max-width:820px;margin:0 auto;padding:1rem 0.5rem}
.hdr{display:flex;align-items:center;justify-content:space-between;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:0.75rem 1rem;margin-bottom:1rem}
.hdr-title{font-size:15px;font-weight:500;text-align:right}
.hdr-sub{font-size:12px;color:var(--color-text-secondary);text-align:right;margin-top:2px}
.logo-box{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--color-text-secondary)}
.prog-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:0.5rem}
.prog-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:0.75rem}
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem}
.nav button{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.nav button:hover{background:var(--color-background-secondary)}
.nav button:disabled{opacity:0.35;cursor:default}
.btn-res{border-color:#0F6E56!important;color:#0F6E56!important;margin-left:auto}
.btn-res:hover{background:#E1F5EE!important}
.textbox{background:var(--color-background-secondary);border-left:3px solid #1D9E75;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:0.875rem 1rem;margin-bottom:0.875rem;font-size:14px;line-height:1.8}
.textbox mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px}
.key-lbl{margin-bottom:0.75rem;font-size:12px;font-weight:500;color:#92560A;background:#FEF3DC;border:0.5px solid #FAC775;border-radius:var(--border-radius-md);display:inline-block;padding:3px 9px}
.question{font-size:15px;font-weight:500;margin-bottom:0.75rem}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:0.875rem}
.choice{padding:10px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:14px;display:flex;align-items:flex-start;gap:10px;background:var(--color-background-primary);text-align:left}
.choice:hover:not(.correct):not(.wrong){background:var(--color-background-secondary)}
.choice .bdg{font-weight:500;min-width:18px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.feedback{border-radius:var(--border-radius-md);padding:9px 13px;margin-top:0.5rem;font-size:14px}
.fb-ok{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
.fb-ko{background:#FAECE7;color:#4A1B0C;border:0.5px solid #F0997B}
.sum-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:0.875rem}
.score-big{font-size:38px;font-weight:500;color:#1D9E75}
.nclc-badge{font-size:24px;font-weight:500;color:#BA7517;margin:6px 0}
.grid{display:flex;flex-wrap:wrap;gap:5px;margin:0.875rem 0}
.gcell{width:32px;height:32px;border-radius:var(--border-radius-md);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff}
.gcell.ok{background:#1D9E75}.gcell.ko{background:#993C1D}.gcell.na{background:var(--color-border-secondary);color:var(--color-text-secondary)}
.btn-rpt{padding:8px 18px;background:#1D9E75;color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-weight:500;margin-right:7px;margin-top:7px}
.btn-rst{padding:8px 18px;background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;margin-top:7px}
.rq{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:0.875rem 1rem;margin-bottom:0.875rem}
.rq .rt{background:var(--color-background-secondary);border-left:3px solid #1D9E75;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:0.625rem 0.875rem;font-size:13px;line-height:1.75;margin-bottom:0.625rem}
.btn-back{padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid #0F6E56;background:var(--color-background-primary);color:#0F6E56;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:0.875rem}
.note{font-size:11px;color:var(--color-text-secondary);margin-top:7px}
</style>
<div id="app"><div id="view"></div></div>
<script>
var QQ=[
{t:"INFIRMERIE\nJe suis en consultation.\nRevenez dans quelques minutes",q:"Que faire pour rencontrer l'infirmière ?",c:["Frapper et entrer.","Prendre rendez-vous.","Revenir plus tard.","Téléphoner."],a:2,k:"Revenez dans quelques minutes"},
{t:"ATTENTION !\nDu 10 avril au 15 septembre, les ascenseurs de votre station de métro sont en réparation. Pour faciliter vos déplacements, les installations changent. Pendant les travaux, prenez l'escalier à droite des guichets.",q:"Qu'est-ce qui est fermé du 10 avril au 15 septembre ?",c:["L'escalier.","La station de métro.","Les ascenseurs.","Les guichets."],a:2,k:"les ascenseurs de votre station de métro sont en réparation"},
{t:"Vie pratique\nConsommez cinq fruits et légumes par jour, limitez la quantité de viande rouge, de beurre, de sucre et de sel et buvez au moins huit verres d'eau par jour ! Vous ferez le plein d'énergie !",q:"Que permet le conseil de « Vie pratique » ?",c:["De faire des économies.","De pratiquer un sport.","De rester en bonne santé.","De trouver des produits bio."],a:2,k:"Vous ferez le plein d'énergie !"},
{t:"Vous souhaitez améliorer votre niveau en langue étrangère ?\nLe Conseil de l'Europe offre à ses salariés des formations dans les langues des pays de l'Union européenne. Inscrivez-vous dès maintenant pour les cours d'italien et d'allemand.",q:"Qu'est-ce que le Conseil de l'Europe propose à ses employés ?",c:["Des cours gratuits.","Des postes à l'étranger.","Des stages en Italie.","Des voyages en Europe."],a:0,k:"offre à ses salariés des formations dans les langues"},
{t:"EXAMEN DE BIOLOGIE\n.... à 15h30 en salle 454.",q:"Quelle information manque au sujet de cet examen ?",c:["La date.","La matière.","Le lieu.","L'heure."],a:0,k:"… à 15h30 en salle 454"},
{t:"Stéphane,\nTu peux apporter le dessert jeudi soir ? Claude s'occupe des entrées, Dominique des boissons et moi du plat principal.\nEn invités-surprise, d'autres copains de notre terminale S3.\nC'est super de se retrouver tous, dix ans après le lycée.\nMaryse.",q:"Qu'est-ce que Maryse organise ?",c:["Un concours de cuisine entre amis.","Un dîner entre anciens élèves.","Un repas avec toute sa famille.","Une fête de fin d'année scolaire."],a:1,k:"d'autres copains de notre terminale S3"},
{t:"Anne, gérante d'Amina, nouvelle boutique spécialisée dans la décoration, vous attend pour vous proposer de nombreux produits et livres spécialisés.",q:"De quoi parle l'annonce ?",c:["De la fermeture d'un magasin.","De l'anniversaire d'un magasin.","De la transformation d'un magasin.","De l'ouverture d'un magasin."],a:3,k:"nouvelle boutique spécialisée dans la décoration"},
{t:"Noël approche !\nPour que vos colis arrivent avant les fêtes. Nous vous proposons de les transporter en mode express. Renseignez-vous auprès de nos conseillers ou rendez-vous directement au guichet.",q:"À quoi sert ce service ?",c:["À acheter des cadeaux.","À envoyer des paquets.","À louer des camions.","À réserver des billets."],a:1,k:"nous vous proposons de les transporter en mode express"},
{t:"Nous célébrons nos 40 ans ce soir : nous essaierons de ne pas mettre la musique trop fort, sinon n'hésitez pas et venez nous voir ! Les invités partiront vers 2 h du matin. Merci.\nAnne et Patrick",q:"Pour quelle raison Anne et Patrick ont-ils écrit ce message ?",c:["Pour inviter des amis à leur anniversaire.","Pour organiser une réunion entre locataires.","Pour prévenir leurs voisins de leur fête.","Pour trouver des musiciens pour la soirée."],a:2,k:"nous essaierons de ne pas mettre la musique trop fort"},
{t:"Lundi 20 juin\nMme Rico sera absente de son bureau exceptionnellement aujourd'hui, lundi. Pour avoir un rendez-vous, vous pourrez la contacter demain à partir de 14 heures. Merci de votre compréhension.",q:"Quand Madame Rico sera-t-elle disponible ?",c:["Dans la journée.","Le lendemain.","Le soir-même.","Vendredi matin"],a:1,k:"vous pourrez la contacter demain à partir de 14 heures"},
{t:"Cher confrère,\nCi-joint notre catalogue de boissons pour cette année. En espérant que vous pourrez satisfaire votre clientèle, nous vous remercions pour vos futurs achats. Avec nos salutations les plus cordiales,\nEntreprise Labayle et Chandon.",q:"Quel est l'objet de ce courrier ?",c:["Demander des informations sur des produits.","Passer une commande de produits.","Présenter de nouveaux produits.","Proposer une dégustation de produits."],a:1,k:"nous vous remercions pour vos futurs achats"},
{t:"Fini les souvenirs de voyages trop flous. Pour s'entraîner, direction Lyon pour un weekend. Sur place, une jeune agence spécialisée vous propose un stage pour découvrir la ville autrement. L'objectif : sur une journée, travailler la photographie et découvrir en même temps avec un guide les monuments historiques de la ville.",q:"Que propose cette agence ?",c:["D'apprendre à s'orienter dans la ville.","De se former au métier de guide.","De visiter des expositions photo.","De voir Lyon d'une façon différente."],a:3,k:"un stage pour découvrir la ville autrement"},
{t:"CHERS CLIENTS,\nVotre supermarché vous accueille depuis 60 ANS. Le propriétaire et son équipe vous invitent à une semaine de festivités. À partir du 10 août, plus de 1000 OFFRES EXCEPTIONNELLES et des réductions JUSQU'À 50% sur les articles vous attendent.",q:"Qu'est-ce qu'on fête ?",c:["L'anniversaire d'un magasin.","L'augmentation des ventes.","L'ouverture d'un commerce.","Le début des soldes d'été."],a:0,k:"Votre supermarché vous accueille depuis 60 ANS"},
{t:"Fils et petit-fils de vendeurs de fruits et légumes, Anthony Palou raconte les moments drôles et tendres de son enfance à Quimper, en Bretagne, dans les années 1970. Retour sur les riches heures du petit commerce et sur sa destruction par les supermarchés. Poursuivi par les banquiers, le père de l'auteur devra fermer… Le deuxième roman de l'auteur de « Camille » confirme un réel talent.",q:"Quel est l'objectif de cet article ?",c:["Annoncer la sortie d'un roman.","Défendre les petits commerces.","Donner la parole à des enfants.","Faire connaître la ville de Quimper."],a:0,k:"Le deuxième roman de l'auteur de \u00ab Camille \u00bb confirme un réel talent"},
{t:"On fait des affaires ? C'est le titre de l'émission que notre radio vous propose d'écouter pour découvrir la vie d'une entreprise française. Apprenez à parler la langue des affaires et à comprendre les comportements et la culture du travail en France.",q:"Que propose cette émission ?",c:["Une familiarisation avec les codes socio-professionnels français.","Une formation à de nouvelles méthodes technico-commerciales","Une préparation pour travailler dans une entreprise à l'étranger.","Une présentation des emplois dans des sociétés internationales."],a:0,k:"Apprenez à parler la langue des affaires et à comprendre les comportements et la culture du travail en France"},
{t:"BONNE IDÉE\nNuméro 1 français de badminton, Brice Leverdez a lancé lundi une opération de « financement participatif » pour sa préparation aux Jeux Olympiques. Une manière de récolter de l'argent supplémentaire dans un sport peu sponsorisé. « C'est un moyen pour les gens de faire partie du projet. Si je rapporte une médaille des prochains JO, ils pourront dire qu'ils ont aidé Brice Leverdez à y arriver », explique-t-il.",q:"Qu'est-ce que les donateurs peuvent espérer ?",c:["Un rendez-vous avec le sportif.","Une place offerte pour les JO.","Une séance de badminton.","Une victoire de Brice Leverdez."],a:3,k:"ils pourront dire qu'ils ont aidé Brice Leverdez à y arriver"},
{t:"Courir les 42,195 km du marathon de Paris ne s'improvise pas. C'est une course qui nécessite de s'entraîner régulièrement et d'être capable de surmonter le « mur de douleur » qui survient chez tous les marathoniens entre le 32e et le 37e kilomètre. « Pour espérer terminer l'épreuve, il faut courir depuis au moins un an et, dans les dix dernières semaines, faire trois à quatre heures d'entraînement hebdomadaires réparties en autant de séances », insiste un organisateur de stages de préparation.",q:"Quel est le conseil de cet organisateur avant de participer au marathon ?",c:["Avoir comme seul objectif de terminer l'épreuve.","Pratiquer la course à pied plusieurs fois par semaine.","Prendre régulièrement des médicaments anti-douleur.","Se donner de longues périodes de récupération."],a:1,k:"faire trois à quatre heures d'entraînement hebdomadaires"},
{t:"Le marché des saveurs est ouvert : venez y découvrir le savoir-faire de notre région : poulets rôtis, viandes grillées, charcuteries, fromages frais, miel, confitures, tartes, gâteaux…\nVous composerez votre menu et dégusterez nos petits plats sous le chapiteau de la buvette.",q:"Que peut-on acheter au marché des saveurs ?",c:["Des objets d'art.","Des spécialités locales.","Des produits écologiques.","Des marchandises exotiques."],a:1,k:"découvrir le savoir-faire de notre région"},
{t:"Les repas servis dans les avions de ligne ont toujours été tristement réputés pour leur fadeur. Mais il semblerait que les chefs n'y soient pour rien. D'après une étude, les nuisances sonores importantes peuvent en effet réduire la sensibilité des palais, rendant la nourriture peu savoureuse. Le vrombissement des réacteurs expliquerait le peu d'enthousiasme des passagers pour les plateaux servis à bord.",q:"Quelle est la conclusion de cette étude ?",c:["L'anxiété en avion diminue la sensation de faim.","La qualité de la nourriture se détériore en altitude.","Le bruit altère le sens du goût des passagers.","Les plats proposés en vol manquent de saveur."],a:2,k:"les nuisances sonores importantes peuvent en effet réduire la sensibilité des palais"},
{t:"Paris, le 13 mars\nMadame, Monsieur,\nCe courrier fait suite à mon achat d'un téléphone le 5 mars dernier. Après réflexion, je souhaiterais le rendre car j'ai finalement décidé d'acheter un appareil avec messagerie intégrée.\nAinsi, je vous prie de bien vouloir me restituer la somme de 80 euros, correspondant à la somme versée le 5 mars par chèque.\nAndré Cellier",q:"Quel est l'objet de la lettre de monsieur Cellier ?",c:["Le remboursement de son article.","L'échange de son téléphone.","L'envoi de son téléphone par la poste.","Une réclamation sur son achat."],a:0,k:"je vous prie de bien vouloir me restituer la somme de 80 euros"},
{t:"Pendant un an, la journaliste allemande Greta Taubert a décidé de quitter la société de consommation sans quitter son appartement berlinois. Pendant cette expérience, elle a bu, mangé, s'est habillée sans payer : elle a échangé jupes et pantalons avec ses voisines, planté des légumes dans un jardin collectif. « Aujourd'hui, je suis contente de ne plus vivre aussi radicalement, c'était difficile mais je cherche à intégrer dans mon quotidien ce que j'ai appris », explique-t-elle.",q:"Quel est le constat de Greta Taubert après cette expérience?",c:["C'est possible à la campagne.","C'est possible avec du temps.","C'est possible mais pénible.","C'est possible pour tous."],a:2,k:"c'était difficile mais je cherche à intégrer dans mon quotidien ce que j'ai appris"},
{t:"L'année dernière, une étude publiée par la revue Nature faisait grand bruit. Menée par une équipe de l'université de Zurich, l'étude montrait qu'une odeur d'ocytocine diffusée lors d'un entretien avec un banquier pousse les gens à lui confier leur argent ! L'expérience portait sur 56 personnes qui acceptaient de jouer à un jeu d'argent. Avant la discussion, la moitié des personnes avaient respiré un spray d'ocytocine, hormone connue pour jouer un rôle dans l'établissement des relations interpersonnelles",q:"Quel est le but de cette expérience ?",c:["Apprendre à gérer une entrevue importante avec un banquier.","Déterminer le lien, positif ou non, que les gens ont avec l'argent.","Identifier les conditions et facteurs d'addiction aux jeux de hasard.","Montrer l'importance de la chimie dans les rapports humains."],a:3,k:"une odeur d'ocytocine diffusée lors d'un entretien avec un banquier pousse les gens à lui confier leur argent"},
{t:"Éducation numérique\nIl n'y a presque plus aujourd'hui de manuel scolaire qui paraisse sans avoir une double traduction, numérique et en ligne. Mais cependant, nous restons en proximité forte avec le manuel classique. De nouvelles applications qui seraient déconnectées du livre papier ne nous paraissent pas encore à ce stade conformes à notre mission. Autrement dit, les conditions d'un changement d'ensemble ne sont pas réunies.\nM. Huet, éditeur de manuels scolaires",q:"Quelle est la position de cet éditeur de manuels sur la croissance du support numérique ?",c:["Il considère que l'ère du support papier est définitivement terminée.","Il estime qu'il reste du travail à faire pour mieux préparer cette évolution.","Il juge indispensable de n'utiliser que les supports électroniques.","Il pense qu'il faut privilégier le contact des élèves avec l'outil Internet."],a:1,k:"les conditions d'un changement d'ensemble ne sont pas réunies"},
{t:"On réserve trop facilement le covoiturage aux étudiants sans un sou. Les clichés sont tenaces. Pourtant, le temps de la petite annonce papier accrochée près de la machine à café est bel et bien terminé, les nouveaux moyens de communication ont changé les choses. L'organisation d'un trajet entre plusieurs personnes qui se rendent dans la même direction est devenue si simple et si efficace avec les sites spécialisés que le covoiturage est en train d'élargir son public.",q:"Quel développement connaît le covoiturage ?",c:["Il devient la solution idéale des voyages organisés à la dernière minute","Il est accessible à un nombre croissant d'utilisateurs grâce à Internet.","Il occupe une place grandissante dans les petites annonces des journaux.","Il s'impose comme le moyen de déplacement à la mode chez les jeunes."],a:1,k:"le covoiturage est en train d'élargir son public"},
{t:"Le temps des cerises — Pièce de théâtre de Niels Arestrup\nUn vieil homme, dérangé dans sa vieille maison par une jeune femme : disputes, goût de la vie retrouvé, moments de tendresse... La comédienne Cécile de France joue avec autant de talent qu'au cinéma. Le comédien Eddy Mitchell, dans le rôle du vieux peintre, manque de noirceur. Dommage que le metteur en scène n'interprète pas lui-même le personnage principal. On passe un bon moment mais pas un grand moment.",q:"Sur quel aspect de la pièce porte la critique ?",c:["La mise en scène.","La qualité des décors.","Le jeu des interprètes.","L'intérêt de l'intrigue."],a:2,k:"La comédienne Cécile de France joue avec autant de talent qu'au cinéma"},
{t:"Les auteurs européens ont persuadé la maison d'édition Livresque d'aller plus loin que la simple numérisation des livres universitaires. Les écrivains ont demandé à ce qu'ils soient remis dans le circuit commercial. Les bénéfices générés par la publicité et les droits de licence iront en partie à Livresque, mais la grande majorité de l'argent gagné par cette mise à disposition des ouvrages sera directement remise aux auteurs puisqu'ils toucheront leurs droits.",q:"D'après le texte, quel avantage les auteurs tireront-ils de la numérisation des livres ?",c:["Elle augmentera le nombre de lecteurs.","Elle développera la visibilité des œuvres.","Elle diminuera le coût des ouvrages.","Elle entraînera un gain financier."],a:3,k:"la grande majorité de l'argent gagné par cette mise à disposition des ouvrages sera directement remise aux auteurs"},
{t:"Depuis plusieurs années, Thierry Marx, un grand chef français, intervient pour donner des cours de cuisine en prison. Faire découvrir à ce public, contraint de vivre en milieu fermé, qu'une profession, quelle qu'elle soit, peut être épanouissante, est une tâche qui le passionne. Le désir de rallumer cette lueur d'espoir, de montrer « qu'après », il peut y avoir une réinsertion réussie, est un moteur pour relever ce défi.",q:"Pourquoi Thierry Marx intervient-il dans les prisons ?",c:["Pour améliorer les méthodes de travail de la cantine.","Pour encourager la création de formations professionnelles.","Pour faire naître l'envie de s'investir dans un métier.","Pour sensibiliser le grand public à la réalité de la vie carcérale."],a:2,k:"Le désir de rallumer cette lueur d'espoir"},
{t:"En rendant accessible à tout moment une multitude d'informations, Internet modifie profondément notre relation à la connaissance. Il serait pourtant tout à fait illusoire d'imaginer que ce qui est accessible sur la Toile n'a pas besoin d'être appris pour la simple raison de sa disponibilité permanente. Avoir accès par la Toile aux mêmes informations ne compense absolument pas l'absence d'apprentissage.",q:"D'après l'article, de quelle manière Internet agit-il sur nous ?",c:["Il change notre regard sur les livres.","Il facilite la mémorisation de nouveaux concepts.","Il revalorise la culture transmise par l'école.","Il transforme notre rapport au savoir."],a:3,k:"Internet modifie profondément notre relation à la connaissance"},
{t:"Aux débuts d'Internet, je me souviens d'avoir lu, éberluée, dans un magazine féminin « Mon mari était absent, il passait tout son temps sur le chat », et j'en étais à tenter de visualiser ce triste état de fait lorsque je compris ma méprise : avoir confondu le chat, le félidé, avec le chat, la discussion sur Internet. Depuis ce jour, aucun progrès sur cette équivoque terrible de la langue. Le bon sens voudrait que la phonétique l'emporte et que l'on écrive « tchat ».",q:"Qu'est-ce qui dérange l'auteur de ce texte ?",c:["L'abus d'anglicismes en langage informatique.","L'ambiguïté du néologisme « chat » à l'écrit.","Le laxisme orthographique dans les forums.","Le manque d'imagination des lexicologues."],a:1,k:"aucun progrès sur cette équivoque terrible de la langue"},
{t:"Elle s'appelait Sarah\nLe cinéaste n'arrive pas à éviter l'artifice du scénario : pingpong incessant et artificiel entre le passé et le présent. Néanmoins, chaque fois qu'il change d'époque, le cinéaste repart à la recherche de l'émotion perdue. Aucun débordement lacrymal. Les acteurs restent jusqu'au bout étonnamment sobres. Le film est un mélo, un vrai. C'est aussi un « film du samedi soir », avec ses drames, ses sacrifices, parfois même ses outrances…",q:"Sur quel élément du film porte la réserve du critique ?",c:["L'atmosphère lourde et pathétique.","L'utilisation abusive de flashbacks.","La caricature du film de genre.","Le jeu sans conviction des comédiens."],a:1,k:"l'artifice du scénario : pingpong incessant et artificiel entre le passé et le présent"},
{t:"De : Pascale@radioair.fr — Objet : Remerciements\n\nCher tous,\nAmis, techniciens, auditeurs, animateurs, président de notre radio, vous qui avez toujours été là pour Des Airs, je voulais dire un très grand merci ! je le répéterai le 1er juillet pour la dernière fois sur les ondes à l'occasion de la 200° : notre radio a été pour moi un merveilleux espace de liberté ! Quel bonheur de vous avoir eu tous autour de moi samedi !\nPascale",q:"Qu'ont-ils tous fêté samedi ?",c:["L'anniversaire d'une radio","La 200ème édition d'une émission","Le départ d'une animatrice","Le travail d'un directeur"],a:1,k:"à l'occasion de la 200°"},
{t:"La première difficulté, qu'il avait en réalité sous-estimée, fut de réussir à atteindre l'extrémité du trottoir, c'est-à-dire de franchir la masse mouvante et compacte des hommes et des femmes qui marchaient devant lui. Il eut beau dans un premier temps prononcer à haute voix de nombreuses paroles d'excuse, se montrer on ne peut plus poli et plus encore, personne ne s'arrêta, ni ne se poussa afin de lui permettre de se faufiler entre les corps.",q:"Dans quelle situation se trouve le personnage principal ?",c:["Il a du mal à se déplacer dans la foule.","Il est emporté par une foule pressée.","Il est paralysé par l'hostilité de la foule.","Il imagine les répliques impolies de la foule."],a:0,k:"personne ne s'arrêta, ni ne se poussa afin de lui permettre de se faufiler entre les corps"},
{t:"Mais qu'est-ce qu'être autonome ?\nL'autonomie a été un idéal de la fin des années 70 et, depuis, est devenue une norme. Est-ce rechercher en soi les forces pour agir ? Cette représentation d'un sujet en relation avec lui-même est contestée par certains penseurs pour qui agir par soi-même, ce n'est pas s'inventer mais être capable de se diriger seul. Autrement dit, on peut être autonome en appliquant des règles que l'on a apprises et dont l'origine ne se trouve donc pas au fond de nous mais dans le contexte social où nous existons.",q:"Qu'est-ce qu'être autonome, selon ce texte ?",c:["Devenir indifférent aux autres.","Disposer de ressources intérieures.","Exploiter les compétences acquises.","S'éloigner de la vie en société."],a:1,k:"on peut être autonome en appliquant des règles que l'on a apprises"},
{t:"Monsieur et Madame Martin n'ont pas un emploi du temps également captivant. Quand Monsieur se rend au travail, Madame manie l'aspirateur. Quand il est au bureau, elle achète des surgelés au supermarché. Quand il se cale devant la télé, l'épouse modèle se colle aux fourneaux. Non, les images d'un exercice pour une classe de CP afin de « comprendre la simultanéité » en étudiant les moments de la « journée d'une famille ». Quand Virginie Sassoon est tombée sur ce document ultra-stéréotypé dans le classeur de sa fille, cette maman est tombée des nues.",q:"Pourquoi Virginie Sassoon est-elle choquée par les exercices proposés dans la classe de sa fille ?",c:["Ils correspondent à des programmes scolaires obsolètes.","Ils méconnaissent l'existence des familles recomposées.","Ils présentent un partage sexiste des tâches dans le couple.","Ils se moquent du quotidien des personnes sans emploi."],a:2,k:"ce document ultra-stéréotypé dans le classeur de sa fille, cette maman est tombée des nues"},
{t:"Ceux qui l'ont vu cet été aux Francofolies n'en sont pas revenus. Trente ans après ses débuts, le chanteur Joseph Many a subjugué l'assistance. Il lui a fallu du temps pour se convaincre que monter sur scène pour y pousser la chansonnette était encore à son âge. Les ritournelles des années 1970 l'avaient propulsé à son époque sur le devant de la scène. Puis sa brillante carrière d'écrivain l'avait convaincu de se consacrer à l'écriture, jusqu'à ce que l'inspiration musicale revienne.",q:"Pourquoi Joseph Many a-t-il tardé à revenir sur scène ?",c:["Il se sentait trop vieux pour les tournées","Il voulait fuir son image d'idole des jeunes","Le public préférait l'écrivain au chanteur","Ses chansons étaient passées de mode"],a:0,k:"Il lui a fallu du temps pour se convaincre que monter sur scène pour y pousser la chansonnette était encore à son âge"},
{t:"La bioéthique fait l'objet d'une polémique qui confronte deux écoles.\nPour la première, composée de chercheurs et de rationalistes, le progrès scientifique ne saurait être limité. On en viendra à un eugénisme contrôlé qui améliorera l'espèce humaine. La seconde école, des philosophes ou des ecclésiastiques, affirme ses craintes en ce qui concerne la pratique d'un eugénisme scientifique : il permettra la sélection efficace des embryons et ouvrira de plus en plus largement ses critères de choix à des exigences non pathologiques.",q:"Sur quoi portent les réserves des partisans de la seconde école ?",c:["Le coût social élevé de prise en charge des maladies génétiques.","Le développement de traitements curatifs de pathologies génétiques.","Le mode de financement de la recherche génétique fondamentale.","Les dérives induites par l'amélioration du patrimoine génétique."],a:3,k:"affirme ses craintes en ce qui concerne la pratique d'un eugénisme scientifique"},
{t:"Mozart est le compositeur le plus joué, le plus aimé et le plus exploité. Ainsi, en 1993, la psychologue américaine Frances Rauscher annonçait que l'écoute de la Sonate pour deux pianos en ré majeur développait l'intelligence. En effet, après avoir écouté ce morceau, 36 étudiants avaient obtenu de meilleurs résultats à un test de localisation spatiale. En 1999, une nouvelle étude venait contredire les conclusions de Frances Rauscher.",q:"A quelle conclusion est arrivée Frances Rauscher concernant l'écoute de la sonate de Mozart ?",c:["Elle a un effet négligeable sur l'intellect.","Elle accroît la capacité de concentration.","Elle facilite le repérage dans l'espace.","Elle perturbe le raisonnement logique."],a:2,k:"36 étudiants avaient obtenu de meilleurs résultats à un test de localisation spatiale"},
{t:"PRÉVOIR LE TEMPS\nL'énorme masse de données météorologiques collectées tous les jours par les satellites est traitée par les plus gros ordinateurs du monde. Le résultat de ces calculs est fourni sous forme de cartes des vents, des pluies ou des températures.\nLes ordinateurs font des calculs que le météorologue doit compléter. Au vu des informations, il prépare un scénario sur le temps le plus probable dans un, deux ou trois, voire dix jours dans certains centres.",q:"En quoi consiste la profession décrite ?",c:["Concevoir des prévisions à court terme.","Élaborer des programmes de calcul.","Finaliser des animations visuelles.","Synthétiser les informations des satellites."],a:0,k:"il prépare un scénario sur le temps le plus probable"},
{t:"Panache et arrogance, élégance et futilité, galanterie et gauloiserie : s'il existe, et à condition que cette notion ait encore un sens à l'ère de la mondialisation, l'esprit français tire son essence particulière du fragile équilibre entre ces oppositions. Amateur de grands principes, de coups de sang et de bons mots, c'est l'esprit français. Quoi que nous en disions il nous obsède.\nLa mondialisation va-t-elle le dissoudre, et nous renvoyer au triste rang de pays ordinaire ?",q:"Selon l'auteur, qu'est-ce que l'esprit français ?",c:["Des attitudes contradictoires forgeant une identité.","Un égocentrisme désuet au temps de la mondialisation.","Un ensemble de valeurs partagées par une élite.","Une aptitude à l'ouverture qui tend à disparaître."],a:0,k:"l'esprit français tire son essence particulière du fragile équilibre entre ces oppositions"}
];

var ans={},cur=0;
var L=["A","B","C","D"];

function pts(i){var n=i+1;if(n<=4)return 3;if(n<=10)return 9;if(n<=19)return 15;if(n<=29)return 21;if(n<=35)return 26;return 33;}
function nclc(s){if(s>=549)return{lv:"NCLC 10+",msg:"Excellent ! Niveau NCLC 10 et plus."};if(s>=524)return{lv:"NCLC 9",msg:"Très bien ! Niveau NCLC 9."};if(s>=499)return{lv:"NCLC 8",msg:"Très bien ! Niveau NCLC 8."};if(s>=453)return{lv:"NCLC 7",msg:"Objectif immigration atteint ! Niveau NCLC 7."};if(s>=406)return{lv:"NCLC 6",msg:"Encore un peu d'effort pour atteindre le NCLC 7 !"};if(s>=375)return{lv:"NCLC 5",msg:"Continuez à pratiquer, niveau NCLC 5."};if(s>=342)return{lv:"NCLC 4",msg:"Continuez à pratiquer, niveau NCLC 4."};return{lv:"< NCLC 4",msg:"Continuez à pratiquer !"};}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hl(t,k){var h=esc(t).split("\n").join("<br>");try{var ek=esc(k);var i=h.toLowerCase().indexOf(ek.toLowerCase());if(i>=0)h=h.substring(0,i)+"<mark>"+h.substring(i,i+ek.length)+"</mark>"+h.substring(i+ek.length);}catch(e){}return h;}

function hdr(){
var done=Object.keys(ans).length;
var pct=Math.round(done/QQ.length*100);
return '<div class="hdr"><div class="logo-box">MLI — Institut de langues de Montréal</div><div><div class="hdr-title">Compréhension écrite – Test 7</div><div class="hdr-sub">'+QQ.length+' questions &nbsp;|&nbsp; '+done+' répondues</div></div></div>'+
'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
'<div class="prog-labels"><span>Question '+(cur+1)+' / '+QQ.length+'</span><span>'+pct+'% complété</span></div>';
}

function render(i){
cur=i;var q=QQ[i],ua=ans[i],done=ua!==undefined;
var tx=done?hl(q.t,q.k):esc(q.t).split("\n").join("<br>");
var kl=done?'<div class="key-lbl">Phrase-clé surlignée</div>':'';
var nav='<div class="nav">'+
(cur>0?'<button onclick="render('+(cur-1)+')">← Précédente</button>':'<button disabled>← Précédente</button>')+
(cur<QQ.length-1?'<button onclick="render('+(cur+1)+')">Suivante →</button>':'<button disabled>Suivante →</button>')+
'<button class="btn-res" onclick="summary()">Résultats</button></div>';
var ch='<div class="choices">';
for(var c=0;c<q.c.length;c++){
var cls="choice";
if(done){if(c===q.a)cls+=" correct";else if(ua.choice===c)cls+=" wrong";}
var oc=done?"":'onclick="pick('+i+','+c+')"';
ch+='<button class="'+cls+'" '+oc+'><span class="bdg">'+L[c]+'</span><span>'+esc(q.c[c])+'</span></button>';
}
ch+='</div>';
var fb='';
if(done){fb=ua.ok?'<div class="feedback fb-ok">Correct !</div>':'<div class="feedback fb-ko">Incorrect — La bonne réponse est : <strong>'+L[q.a]+') '+esc(q.c[q.a])+'</strong></div>';}
document.getElementById("view").innerHTML=hdr()+nav+'<div class="textbox">'+tx+'</div>'+kl+'<div class="question">'+esc(q.q)+'</div>'+ch+fb;
try{sessionStorage.setItem("ce7a",JSON.stringify(ans));sessionStorage.setItem("ce7c",cur);}catch(e){}
}

function pick(qi,ci){if(ans[qi]!==undefined)return;ans[qi]={choice:ci,ok:ci===QQ[qi].a};render(qi);}

function summary(){
var ok=0,score=0;
for(var k in ans){if(ans[k].ok){ok++;score+=pts(parseInt(k));}}
var n=nclc(score);
var g='<div class="grid">';
for(var i=0;i<QQ.length;i++){var cls="gcell "+(ans[i]===undefined?"na":ans[i].ok?"ok":"ko");g+='<div class="'+cls+'" onclick="render('+i+')" title="Q'+(i+1)+'">'+(i+1)+'</div>';}
g+='</div>';
document.getElementById("view").innerHTML=hdr()+
'<div class="sum-card">'+
'<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px">Résultats</div>'+
'<div class="score-big">'+ok+' / '+QQ.length+' <span style="font-size:15px;color:var(--color-text-secondary)">réponses correctes</span></div>'+
'<div style="font-size:20px;font-weight:500;margin:6px 0">Score TCF estimé : <span style="color:var(--color-text-primary)">'+score+' / 699</span></div>'+
'<div class="nclc-badge">'+n.lv+'</div>'+
'<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:0.875rem">'+esc(n.msg)+'</div>'+
g+
'<div><button class="btn-rpt" onclick="showReport()">Voir le rapport des erreurs</button>'+
'<button class="btn-rst" onclick="restart()">Recommencer</button></div>'+
'<div class="note">* Score estimatif à titre indicatif</div></div>';
}

function showReport(){
var html='<button class="btn-back" onclick="summary()">← Retour aux résultats</button>'+
'<div style="font-size:16px;font-weight:500;margin-bottom:0.875rem">Rapport des erreurs</div>';
var found=false;
for(var i=0;i<QQ.length;i++){
if(ans[i]!==undefined&&!ans[i].ok){found=true;var q=QQ[i];
html+='<div class="rq"><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px">Question '+(i+1)+'</div>'+
'<div class="rt">'+hl(q.t,q.k)+'</div>'+
'<div class="key-lbl">Phrase-clé surlignée</div>'+
'<div style="font-weight:500;font-size:14px;margin:6px 0">'+esc(q.q)+'</div>';
for(var c=0;c<q.c.length;c++){var cls2="choice"+(c===q.a?" correct":ans[i].choice===c?" wrong":"");
html+='<div class="'+cls2+'" style="margin-bottom:5px"><span class="bdg">'+L[c]+'</span><span>'+esc(q.c[c])+'</span></div>';}
html+='</div>';}}
if(!found)html+='<div style="color:#1D9E75;font-weight:500">Aucune erreur ! Parfait !</div>';
document.getElementById("view").innerHTML=html;
}

function restart(){ans={};cur=0;try{sessionStorage.removeItem("ce7a");sessionStorage.removeItem("ce7c");}catch(e){}render(0);}

try{var sa=sessionStorage.getItem("ce7a");var sc=sessionStorage.getItem("ce7c");if(sa)ans=JSON.parse(sa);if(sc)cur=parseInt(sc);}catch(e){}
render(cur);
</script>
