<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulaire TCF NCLC7 — MLI (EN)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#3BB3A0;
  --primary-dark:#2A8F7E;
  --primary-light:#E6F5F3;
  --navy:#1B3A6B;
  --navy-dark:#162F58;
  --bg:#F4F9F8;
  --border:#C8E6E2;
  --text:#1a1a1a;
  --muted:#5A7A76;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:var(--navy);padding:.7rem 1.25rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(27,58,107,.3)}
.header-top{display:flex;align-items:center;gap:1rem;margin-bottom:.6rem}
.logo-img{height:38px;background:#fff;border-radius:6px;padding:3px 8px}
.header-title{color:#fff;font-size:.82rem;font-weight:400;opacity:.8;line-height:1.4}
.header-title strong{font-size:.97rem;font-weight:700;display:block;opacity:1}
.controls{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.filter-label{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;text-transform:uppercase;letter-spacing:.07em;align-self:center}
.divider{width:1px;height:16px;background:rgba(255,255,255,.2);margin:0 .2rem;align-self:center}

.btn{padding:4px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);font-size:12px;cursor:pointer;color:rgba(255,255,255,.7);font-weight:500;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.45)}
.btn.active{background:#fff;color:var(--navy);border-color:#fff;font-weight:700}
.btn-a1.active{background:#EEEDFE;color:#3C3489;border-color:#EEEDFE}
.btn-a2.active{background:#E1F5EE;color:#0F6E56;border-color:#E1F5EE}
.btn-b1.active{background:#FAECE7;color:#993C1D;border-color:#FAECE7}
.btn-b2.active{background:#E6F1FB;color:#185FA5;border-color:#E6F1FB}
.btn-noun.active,.btn-other.active{background:#fff;color:var(--navy);border-color:#fff}
.btn-verb.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-adj.active{background:#F0A500;color:#fff;border-color:#F0A500}

.teal-line{height:3px;background:linear-gradient(90deg,var(--navy),var(--primary))}

.mode-bar{display:flex;gap:.5rem;padding:.55rem 1.25rem;background:#fff;border-bottom:2px solid var(--primary)}
.mode-tab{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s}
.mode-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.mode-tab:hover:not(.active){border-color:var(--primary);color:var(--primary-dark)}

.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:.4rem 1.25rem;background:var(--primary-light);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
.starred-toggle{cursor:pointer;font-size:11px;color:var(--muted);background:none;border:none;padding:0}
.starred-toggle.on{color:#E6A800;font-weight:700}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;padding:.9rem 1.25rem}

.card{background:#fff;border-radius:10px;border:1.5px solid var(--border);padding:.85rem .95rem;cursor:pointer;transition:transform .1s,box-shadow .1s;position:relative;user-select:none}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(59,179,160,.15)}
.card.flipped .front{display:none}
.card.flipped .back{display:block}
.back{display:none}
.card.starred-card{border-color:#E6A800;border-width:2px}

.level-badge{position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;letter-spacing:.05em}
.badge-a1{background:#EEEDFE;color:#3C3489}
.badge-a2{background:#E1F5EE;color:#0F6E56}
.badge-b1{background:#FAECE7;color:#993C1D}
.badge-b2{background:#E6F1FB;color:#185FA5}

.gender-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;margin-left:3px;vertical-align:middle}
.g-m{background:#E6F5F3;color:var(--primary-dark)}
.g-f{background:#FDE8F0;color:#A0295A}
.g-mf{background:#F0EEF9;color:#5B4A9B}

.star-btn{position:absolute;top:7px;left:7px;font-size:14px;background:none;border:none;cursor:pointer;opacity:.2;transition:opacity .15s;line-height:1}
.star-btn.on{opacity:1}
.card:hover .star-btn{opacity:.5}
.card:hover .star-btn.on{opacity:1}

.card-emoji{font-size:1.8rem;line-height:1;margin-bottom:.3rem;display:block;text-align:center}
.word-fr{font-size:1.15rem;font-weight:700;color:var(--navy);margin:.1rem 0;line-height:1.3;text-align:center}
.word-type{font-size:10px;color:#bbb;margin-bottom:.45rem;text-align:center}
.hint{font-size:9px;color:#ccc;text-align:center;margin-top:.35rem}
.speak-btn{background:none;border:none;cursor:pointer;font-size:12px;opacity:.35;margin-left:3px;vertical-align:middle}
.speak-btn:hover{opacity:1}

.back .word-fr-sm{font-size:.85rem;color:#bbb;text-align:center;margin-bottom:.2rem}
.back .word-zh{font-size:1.15rem;font-weight:700;color:var(--text);text-align:center;margin-bottom:.15rem}
.back .word-en{font-size:.8rem;color:#999;text-align:center;font-style:italic}
.back .cat-tag{font-size:9px;color:#ccc;text-align:center;margin-top:.4rem}
.back .gender-display{text-align:center;margin:.25rem 0 .1rem;font-size:11px;color:var(--muted)}

.type-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot-noun{background:var(--navy)}
.dot-verb{background:var(--primary)}
.dot-adj{background:#F0A500}
.dot-other{background:#A0A0B0}

.quiz-wrap{padding:1.25rem;max-width:560px;margin:0 auto}
.quiz-card{background:#fff;border-radius:14px;border:1.5px solid var(--border);padding:2rem 1.5rem;text-align:center;margin-bottom:1rem;box-shadow:0 4px 16px rgba(59,179,160,.1)}
.quiz-q-emoji{font-size:2.8rem;margin-bottom:.4rem}
.quiz-q-fr{font-size:1.55rem;font-weight:700;color:var(--navy);margin-bottom:.15rem}
.quiz-q-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.quiz-opt{padding:.65rem .8rem;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:.88rem;cursor:pointer;transition:all .15s;text-align:left;color:var(--text)}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.correct{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);font-weight:600}
.quiz-opt.wrong{background:#FAECE7;border-color:#993C1D;color:#993C1D}
.quiz-opt.reveal{background:#f8f8f8;color:#ccc;border-color:#eee}
.quiz-progress{display:flex;gap:4px;margin-bottom:.7rem;justify-content:center;flex-wrap:wrap}
.prog-dot{width:9px;height:9px;border-radius:50%;background:var(--border)}
.prog-dot.done-ok{background:var(--primary)}
.prog-dot.done-err{background:#E05A3A}
.prog-dot.current{background:var(--navy)}
.quiz-score{font-size:.82rem;color:var(--muted);margin-bottom:.5rem;text-align:center}
.quiz-next{width:100%;padding:.6rem;border-radius:10px;background:var(--primary);color:#fff;border:none;font-size:.9rem;cursor:pointer;margin-top:.75rem;font-weight:600}
.quiz-next:hover{background:var(--primary-dark)}
.quiz-finish{background:#fff;border-radius:14px;border:1.5px solid var(--border);padding:2rem;text-align:center}
.quiz-finish h2{font-size:1.3rem;margin-bottom:.5rem;color:var(--navy)}
.quiz-finish p{color:var(--muted);font-size:.9rem;margin-bottom:1.25rem}
.quiz-restart{padding:.55rem 1.5rem;border-radius:20px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:.88rem;font-weight:600;margin:.25rem}
.quiz-restart:hover{background:var(--primary-dark)}

.list-wrap{padding:.75rem 1.25rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{padding:.45rem .6rem;border-bottom:2px solid var(--primary);text-align:left;color:var(--navy);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
td{padding:.38rem .6rem;border-bottom:1px solid #EDF5F4;vertical-align:middle}
tr:nth-child(even) td{background:#F9FEFE}

.empty{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem;grid-column:1/-1}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));padding:.65rem;gap:7px}
  .quiz-opts{grid-template-columns:1fr}
}
</style>
</head>

let activeLevel='all', activeType='all', activeMode='flash', showStarredOnly=false;
let starred = new Set();
try { starred = new Set(JSON.parse(localStorage.getItem('mli_starred')||'[]')); } catch(e){}
function saveStarred(){ try{localStorage.setItem('mli_starred',JSON.stringify([...starred]));}catch(e){} }

function filtered(){
  return WORDS.filter(w =>
    (activeLevel==='all'||w.level===activeLevel) &&
    (activeType==='all'||w.type===activeType) &&
    (!showStarredOnly||starred.has(w.fr))
  );
}

function speakWord(btn){
  const fr = btn.dataset.fr;
  if(!fr) return;
  const fem = btn.dataset.fem || '';
  function tts(word, onEnd){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    const vs = window.speechSynthesis.getVoices();
    const v = vs.find(v=>v.lang==='fr-FR')||vs.find(v=>v.lang==='fr-CA')||vs.find(v=>v.lang.startsWith('fr'));
    if(v) u.voice = v;
    u.lang='fr-FR'; u.rate=0.85;
    if(onEnd) u.onend=onEnd;
    window.speechSynthesis.speak(u);
  }
  function play(word, onEnd){
    const url='https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=fr&client=gtx&q='+encodeURIComponent(word);
    const audio=new Audio(url);
    let done=false;
    function fallback(){ if(done) return; done=true; tts(word, onEnd); }
    audio.onended=()=>{ done=true; if(onEnd) onEnd(); };
    audio.onerror=fallback;
    const t=setTimeout(fallback, 2000);
    const p=audio.play();
    if(p) p.then(()=>{ clearTimeout(t); }).catch(()=>{ clearTimeout(t); fallback(); });
  }
  if(fem && fem!==fr){
    play(fr, ()=>setTimeout(()=>play(fem), 400));
  } else {
    play(fr);
  }
}
function speak(fr){
  // legacy wrapper
  const btn = document.createElement('button');
  btn.dataset.fr = fr;
  speakWord(btn);
}

function genderBadge(w){
  if(w.type!=='noun'||!w.gender) return '';
  const cls=w.gender==='m'?'g-m':w.gender==='f'?'g-f':'g-mf';
  const lbl=w.gender==='m'?'m.':w.gender==='f'?'f.':'m./f.';
  return `<span class="gender-badge ${cls}">${lbl}</span>`;
}

  const words=filtered();
  document.getElementById('stats-text').textContent=`${words.length} words`;
  const area=document.getElementById('main-area');
  if(!words.length){area.innerHTML='<div class="grid"><div class="empty">No words match this filter.</div></div>';return;}
  area.innerHTML='<div class="grid" id="grid"></div>';
  document.getElementById('grid').innerHTML=words.map((w,i)=>{
    const isS=starred.has(w.fr);
    const em=w.emoji||'';
    const gd=w.gender&&w.type==='noun'?`<div class="gender-display">${GENDER_LABEL[w.gender]||''}</div>`:'';
    return `<div class="card${isS?' starred-card':''}" data-idx="${i}" onclick="flipCard(this)">
      <button class="star-btn${isS?' on':''}" data-fr="${i}" onclick="event.stopPropagation();toggleStar(${i},this)">⭐</button>
      <span class="level-badge badge-${w.level.toLowerCase()}">${w.level}</span>
      <div class="front">
        ${em?`<span class="card-emoji">${em}</span>`:''}
        <div class="word-fr">${w.type==='adj'&&w.fem&&w.fem!==w.fr ? w.fr+' / '+w.fem : w.fr}${genderBadge(w)}
          <button class="speak-btn" onclick="event.stopPropagation();speakWord(this)" data-fr="${w.fr}" data-fem="${w.fem||''}">🔊</button>
        </div>
        <div class="word-type"><span class="type-dot dot-${w.type}"></span>${TYPE_LABEL[w.type]} · ${w.cat}</div>
        <div class="hint">Click to flip →</div>
      </div>
      <div class="back">
        ${em?`<span class="card-emoji">${em}</span>`:''}
        <div class="word-fr-sm">${w.fr}</div>
        ${gd}
        <div class="word-zh">${w.en}</div>
        <div class="word-en"></div>
        <div class="cat-tag">${TYPE_LABEL[w.type]} · ${w.cat}</div>
      </div>
    </div>`;
  }).join('');
}

function flipCard(el){el.classList.toggle('flipped');}

function toggleStar(idx,btn){
  const fr=WORDS[idx].fr;
  if(starred.has(fr)){starred.delete(fr);btn.classList.remove('on');btn.closest('.card').classList.remove('starred-card');}
  else{starred.add(fr);btn.classList.add('on');btn.closest('.card').classList.add('starred-card');}
  saveStarred();
  if(showStarredOnly) render();
}

// ── LIST ──
function renderList(){
  const words=filtered();
  document.getElementById('stats-text').textContent=`${words.length} words`;
  const wIdx=words.map(w=>WORDS.indexOf(w));
  document.getElementById('main-area').innerHTML=`<div class="list-wrap"><table>
    <thead><tr>
      <th>⭐</th><th>French</th><th>Gender</th><th>English</th><th>Level</th><th>Type</th>
    </tr></thead>
    <tbody>${words.map((w,i)=>{
      const globalIdx=WORDS.indexOf(w);
      const isS=starred.has(w.fr);
      const gc=w.gender==='m'?'g-m':w.gender==='f'?'g-f':w.gender==='mf'?'g-mf':'';
      const gl=w.gender==='m'?'m.':w.gender==='f'?'f.':w.gender==='mf'?'m./f.':'';
      return `<tr>
        <td><button onclick="toggleStarList(${globalIdx},this)" style="background:none;border:none;cursor:pointer;font-size:14px;opacity:${isS?1:.2}">${isS?'⭐':'☆'}</button></td>
        <td style="font-weight:700;color:var(--navy)">${w.type==='adj'&&w.fem&&w.fem!==w.fr ? w.fr+' / '+w.fem : w.fr}
          <button onclick="speakWord(this)" data-fr="${w.fr}" data-fem="${w.fem||''}" style="background:none;border:none;cursor:pointer;font-size:11px;opacity:.35">🔊</button>
        </td>
        <td>${gl?`<span class="gender-badge ${gc}">${gl}</span>`:''}</td>
        <td>${w.en}</td>
        <td style="color:#999;font-style:italic"></td>
        <td><span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:7px;background:${w.level==='A1'?'#EEEDFE':w.level==='A2'?'#E1F5EE':w.level==='B1'?'#FAECE7':'#E6F1FB'};color:${LEVEL_COLOR[w.level]}">${w.level}</span></td>
        <td style="color:#aaa;font-size:11px">${TYPE_LABEL[w.type]}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function toggleStarList(idx,btn){
  const fr=WORDS[idx].fr;
  if(starred.has(fr)){starred.delete(fr);btn.textContent='☆';btn.style.opacity='.2';}
  else{starred.add(fr);btn.textContent='⭐';btn.style.opacity='1';}
  saveStarred();
  if(showStarredOnly) render();
}

// ── QUIZ ──
let quizWords=[], quizIdx=0, quizScore=0, quizResults=[], quizAnswered=false;

function startQuiz(){
  const pool=filtered();
  if(pool.length<4){document.getElementById('main-area').innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted)">Please select at least 4 words to start the quiz.</div>';return;}
  quizWords=shuffle([...pool]).slice(0,Math.min(20,pool.length));
  quizIdx=0;quizScore=0;quizResults=[];quizAnswered=false;
  renderQuiz();
}

function renderQuiz(){
  if(quizIdx>=quizWords.length){renderQuizFinish();return;}
  const w=quizWords[quizIdx];
  const pool=filtered();
  const opts=shuffle([w,...shuffle(pool.filter(x=>x.fr!==w.fr)).slice(0,3)]);
  const globalIdx=WORDS.indexOf(w);
  const gc=w.gender==='m'?'g-m':w.gender==='f'?'g-f':w.gender==='mf'?'g-mf':'';
  const gl=w.gender==='m'?'m.':w.gender==='f'?'f.':w.gender==='mf'?'m./f.':'';
  const dots=quizWords.map((_,i)=>`<div class="prog-dot ${i<quizIdx?(quizResults[i]?'done-ok':'done-err'):i===quizIdx?'current':''}"></div>`).join('');
  document.getElementById('main-area').innerHTML=`<div class="quiz-wrap">
    <div class="quiz-progress">${dots}</div>
    <div class="quiz-score">Q ${quizIdx+1} / ${quizWords.length} · Score ${quizScore}</div>
    <div class="quiz-card">
      ${w.emoji?`<div class="quiz-q-emoji">${w.emoji}</div>`:''}
      <div class="quiz-q-fr">${w.fr}
        ${gl?`<span class="gender-badge ${gc}">${gl}</span>`:''}
        <button onclick="speakWord(this)" data-fr="${w.fr}" style="background:none;border:none;cursor:pointer;font-size:16px;opacity:.4">🔊</button>
      </div>
      <div class="quiz-q-sub">${TYPE_LABEL[w.type]} · ${w.level}</div>
      <div class="quiz-opts" id="quiz-opts">
        ${opts.map((o,oi)=>`<button class="quiz-opt" data-fr="${o.fr}" data-correct="${w.fr}" onclick="answerQuiz(this)">${o.en}</button>`).join('')}
      </div>
      <button class="quiz-next" id="quiz-next" style="display:none" onclick="nextQuiz()">Next →</button>
    </div>
  </div>`;
}

function answerQuiz(btn){
  if(quizAnswered) return;
  quizAnswered=true;
  const chosen=btn.dataset.fr;
  const correct=btn.dataset.correct;
  const ok=chosen===correct;
  if(ok) quizScore++;
  quizResults.push(ok);
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    if(b.dataset.fr===correct) b.classList.add('correct');
    else if(b===btn&&!ok) b.classList.add('wrong');
    else b.classList.add('reveal');
    b.disabled=true;
  });
  document.getElementById('quiz-next').style.display='block';
}

function nextQuiz(){quizIdx++;quizAnswered=false;renderQuiz();}

function renderQuizFinish(){
  const pct=Math.round(quizScore/quizWords.length*100);
  const em=pct>=80?'🏆':pct>=60?'😊':'💪';
  document.getElementById('main-area').innerHTML=`<div class="quiz-wrap"><div class="quiz-finish">
    <div style="font-size:3rem;margin-bottom:.5rem">${em}</div>
    <h2>${quizScore} / ${quizWords.length}</h2>
    <p>Score ${pct}%<br>${pct>=80?'Excellent! Keep it up!':pct>=60?'Good job! Keep practising!':'Keep going! Review your starred words.'}</p>
    <button class="quiz-restart" onclick="startQuiz()">Try again</button>
    <button class="quiz-restart" style="background:var(--navy)" onclick="switchMode('flash')">Back to flashcards</button>
  </div></div>`;
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function switchMode(m){
  activeMode=m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  render();
}

function render(){
  if(activeMode==='flash') renderFlash();
  else if(activeMode==='list') renderList();
  else startQuiz();
}

document.querySelectorAll('.btn[data-group]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const g=btn.dataset.group,v=btn.dataset.val;
    if(g==='level') activeLevel=v; else activeType=v;
    document.querySelectorAll(`.btn[data-group="${g}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.querySelectorAll('.mode-tab').forEach(tab=>{
  tab.addEventListener('click',()=>switchMode(tab.dataset.mode));
});

document.getElementById('starred-toggle').addEventListener('click',function(){
  showStarredOnly=!showStarredOnly;
  this.classList.toggle('on',showStarredOnly);
  this.textContent=showStarredOnly?'⭐ Starred':'⭐ Starred only';
  render();
});

render();
</script>
</body>
</html>
