<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF — 1000 Vocabulary Questions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#3BB3A0;--pd:#2A8F7E;--pl:#E6F5F3;
  --navy:#1B3A6B;--bg:#F4F9F8;
  --border:#C8E6E2;--text:#1a1a1a;--muted:#5A7A76;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:.7rem 1.25rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(27,58,107,.3)}
.hinner{display:flex;align-items:center;gap:.85rem}
.logo{height:34px;background:#fff;border-radius:5px;padding:3px 7px}
.htitle{color:#fff}.htitle strong{font-size:.92rem;font-weight:700;display:block}.htitle small{font-size:.72rem;opacity:.7}
.tline{height:3px;background:linear-gradient(90deg,var(--navy),var(--p))}
/* HOME */
.home{padding:1rem 1.25rem}
.summary-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:.9rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.summary-big{font-size:1.4rem;font-weight:700;color:var(--navy)}.summary-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.pbar-wrap{flex:1;height:5px;background:#e0ece8;border-radius:3px;margin-top:.4rem}
.pbar{height:5px;background:var(--p);border-radius:3px;transition:width .4s}
.sec-label{font-size:.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.55rem}
.tcard{background:#fff;border-radius:10px;border:1.5px solid var(--border);padding:.8rem .95rem;cursor:pointer;transition:all .15s;position:relative}
.tcard:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(59,179,160,.15);border-color:var(--p)}
.tcard.done{border-color:var(--p);background:var(--pl)}
.tcard-title{font-size:.83rem;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:.3rem}
.tcard-meta{font-size:.72rem;color:var(--muted)}
.tcard-score{position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;padding:2px 5px;border-radius:7px;background:var(--p);color:#fff}
.tcard-pb{height:3px;background:#e0ece8;border-radius:2px;margin-top:.35rem}.tcard-pb-fill{height:3px;background:var(--p);border-radius:2px}
/* SCREEN */
.screen{max-width:600px;margin:0 auto;padding:1rem 1.25rem}
.screen-hdr{display:flex;align-items:center;gap:.7rem;margin-bottom:1rem}
.back-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);padding:.25rem .5rem;border-radius:6px}
.back-btn:hover{background:var(--pl);color:var(--navy)}
.screen-title{font-size:.9rem;font-weight:700;color:var(--navy);flex:1}.screen-badge{font-size:.75rem;color:var(--muted)}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1rem}
.tab{padding:.5rem .9rem;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
/* WORD LIST */
.word-list{display:flex;flex-direction:column;gap:.4rem}
.word-row{background:#fff;border-radius:10px;border:1.5px solid var(--border);padding:.65rem .9rem;display:flex;align-items:center;gap:.7rem;transition:border-color .15s}
.word-row:hover{border-color:var(--p)}
.word-emoji{font-size:1.4rem;width:1.8rem;text-align:center;flex-shrink:0;line-height:1}
.word-num{font-size:.7rem;color:#ccc;font-weight:600;min-width:16px;flex-shrink:0}
.word-main{flex:1;min-width:0}
.word-fr{font-size:.95rem;font-weight:700;color:var(--navy)}
.word-en{font-size:.82rem;color:var(--text)}
.speak-btn{background:none;border:none;cursor:pointer;font-size:.9rem;opacity:.3;flex-shrink:0}
.speak-btn:hover{opacity:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:.9rem;opacity:.3;flex-shrink:0;transition:opacity .15s}
.star-btn.on{opacity:1}
.star-btn:hover{opacity:.8}
.gender-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
.g-m{background:#E6F5F3;color:#2A8F7E}
.g-f{background:#FDE8F0;color:#A0295A}
.gender-article{font-size:.75rem;font-weight:600;color:var(--p);background:var(--pl);padding:1px 6px;border-radius:6px;margin-right:.25rem}
.q-gender{font-size:.8rem;color:var(--p);font-weight:600;margin:.2rem 0 0}
.t-gender{font-size:.82rem;color:var(--p);font-weight:600;margin:.1rem 0 .5rem}
.start-wrap{padding:1rem 0 .5rem;text-align:center}
.start-btn{background:var(--p);color:#fff;border:none;padding:.6rem 1.75rem;border-radius:20px;font-size:.88rem;font-weight:600;cursor:pointer;margin:.25rem}
.start-btn:hover{background:var(--pd)}
.start-btn.sec{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.start-btn.sec:hover{border-color:var(--p);color:var(--p)}
/* STARRED SECTION */
.starred-box{background:#fff;border-radius:12px;border:1.5px solid #E6A800;padding:.8rem 1rem;margin-bottom:.85rem}
.starred-box-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem}
.starred-box-title{font-size:.8rem;font-weight:700;color:#B8860B}
.clear-btn{background:none;border:none;font-size:.72rem;color:var(--muted);cursor:pointer}
.clear-btn:hover{color:#E05A3A}
.s-row{display:flex;align-items:center;gap:.55rem;padding:.3rem 0;border-bottom:1px solid #f5f0e0}
.s-row:last-child{border-bottom:none}
.s-em{font-size:1.1rem;flex-shrink:0}
.s-fr{font-size:.85rem;font-weight:700;color:var(--navy)}
.s-en{font-size:.76rem;color:var(--muted)}
.unstar{margin-left:auto;background:none;border:none;cursor:pointer;font-size:.8rem;opacity:.4}
.unstar:hover{opacity:1}
/* QUIZ */
.prog-row{display:flex;gap:3px;margin-bottom:.9rem;flex-wrap:wrap}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .2s}
.pdot.ok{background:var(--p)}.pdot.err{background:#E05A3A}.pdot.cur{background:var(--navy)}
.qcard{background:#fff;border-radius:14px;border:1.5px solid var(--border);padding:1.4rem 1.35rem;box-shadow:0 4px 14px rgba(59,179,160,.08)}
.q-emoji{font-size:2.2rem;text-align:center;display:block;margin-bottom:.4rem;line-height:1}
.q-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
.q-fr{font-size:1.4rem;font-weight:700;color:var(--navy);line-height:1.3}
.q-speak{background:none;border:none;cursor:pointer;font-size:.9rem;opacity:.35;margin-left:.3rem;vertical-align:middle}
.q-speak:hover{opacity:1}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:1.1rem}
.opt{padding:.62rem .8rem;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:.86rem;cursor:pointer;transition:all .15s;text-align:left;line-height:1.3;color:var(--text)}
.opt:hover:not(:disabled){border-color:var(--p);background:var(--pl)}
.opt.correct{background:var(--pl);border-color:var(--p);color:var(--pd);font-weight:600}
.opt.wrong{background:#FAECE7;border-color:#E05A3A;color:#993C1D}
.opt.reveal{background:#f5f5f5;color:#bbb;border-color:#eee}
.fb{margin-top:.7rem;padding:.6rem .85rem;border-radius:9px;font-size:.83rem;line-height:1.5;display:none}
.fb.show{display:block}.fb.ok{background:var(--pl);color:var(--pd);border:1px solid var(--p)}
.fb.bad{background:#FAECE7;color:#993C1D;border:1px solid #E05A3A}
.next-btn{width:100%;padding:.6rem;border-radius:10px;background:var(--p);color:#fff;border:none;font-size:.9rem;cursor:pointer;margin-top:.72rem;font-weight:600;display:none}
.next-btn.show{display:block}.next-btn:hover{background:var(--pd)}
/* TYPE */
.type-card{background:#fff;border-radius:14px;border:1.5px solid var(--border);padding:1.4rem 1.35rem;box-shadow:0 4px 14px rgba(59,179,160,.08)}
.t-emoji{font-size:2.5rem;text-align:center;display:block;margin-bottom:.4rem;line-height:1}
.t-prompt{font-size:.78rem;color:var(--muted);margin-bottom:.25rem}
.t-meaning{font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:.7rem}
.t-input{width:100%;padding:.65rem 1rem;border-radius:10px;border:2px solid var(--border);font-size:1rem;font-family:inherit;outline:none;transition:border-color .15s;color:var(--navy);font-weight:600}
.t-input:focus{border-color:var(--p)}
.t-input.right{border-color:var(--p);background:var(--pl)}
.t-input.wrong{border-color:#E05A3A;background:#FAECE7}
.acc-kb{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.acc{padding:.3rem .55rem;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:.95rem;cursor:pointer;color:var(--navy);font-weight:600;transition:all .15s;min-width:2rem;text-align:center}
.acc:hover{background:var(--pl);border-color:var(--p)}
.acc:active{transform:scale(.9)}
.t-fb{margin-top:.55rem;font-size:.83rem;line-height:1.5;min-height:1.2rem}
.t-fb.ok{color:var(--pd);font-weight:600}.t-fb.bad{color:#993C1D}
.t-actions{display:flex;gap:.5rem;margin-top:.55rem;align-items:center;flex-wrap:wrap}
.hint-btn{background:none;border:1.5px solid var(--border);color:var(--muted);padding:.3rem .75rem;border-radius:15px;font-size:.76rem;cursor:pointer}
.hint-btn:hover{border-color:var(--p);color:var(--p)}
.skip-btn{background:none;border:1.5px solid var(--border);color:var(--muted);padding:.3rem .75rem;border-radius:15px;font-size:.76rem;cursor:pointer}
.skip-btn:hover{border-color:#E05A3A;color:#E05A3A}
/* CONJUGATION TABLE */
.conj-box{background:#f8fcfb;border-radius:10px;border:1px solid var(--border);padding:.7rem .9rem;margin-top:.75rem}
.conj-title{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.conj-grid{display:grid;grid-template-columns:auto 1fr;gap:.2rem .7rem;font-size:.82rem}
.conj-pro{color:var(--muted);font-size:.76rem}
.conj-form{font-weight:600;color:var(--navy)}
/* FINISH */
.finish{max-width:500px;margin:1.5rem auto;padding:1rem 1.25rem;text-align:center}
.fcard{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:1.75rem 1.4rem;box-shadow:0 4px 18px rgba(59,179,160,.1)}
.f-emoji{font-size:3.2rem;margin-bottom:.4rem}.f-score{font-size:1.9rem;font-weight:700;color:var(--navy);margin-bottom:.2rem}
.f-msg{font-size:.86rem;color:var(--muted);margin-bottom:1rem}
.f-btns{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:.85rem}
.btn-p{padding:.5rem 1.2rem;border-radius:20px;background:var(--p);color:#fff;border:none;cursor:pointer;font-size:.84rem;font-weight:600}
.btn-p:hover{background:var(--pd)}
.btn-s{padding:.5rem 1.2rem;border-radius:20px;background:#fff;color:var(--navy);border:1.5px solid var(--border);cursor:pointer;font-size:.84rem;font-weight:600}
.btn-s:hover{border-color:var(--p);color:var(--p)}
.rev-list{text-align:left;margin-top:.6rem}
.rev-lbl{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.rev-item{padding:.42rem .65rem;border-radius:8px;font-size:.82rem;margin-bottom:.3rem;background:#FAECE7;display:flex;gap:.5rem;align-items:center}
.rev-em{font-size:1rem;flex-shrink:0}.rev-fr{font-weight:700;color:var(--navy)}.rev-en{color:var(--muted);font-size:.76rem}
/* STARRED PAGE */
.starred-page{max-width:600px;margin:0 auto;padding:1rem 1.25rem}
.starred-page-hdr{display:flex;align-items:center;gap:.7rem;margin-bottom:1rem}
.starred-empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.starred-empty-icon{font-size:3rem;margin-bottom:.5rem}
.starred-topic-group{margin-bottom:1rem}
.starred-topic-label{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.35rem 0;border-bottom:1px solid var(--border);margin-bottom:.4rem}
.starred-full-row{background:#fff;border-radius:10px;border:1.5px solid #E6A800;padding:.65rem .9rem;display:flex;align-items:center;gap:.7rem;margin-bottom:.35rem}
.starred-full-row .word-emoji{font-size:1.4rem;width:1.8rem;text-align:center;flex-shrink:0}
.starred-full-row .word-main{flex:1}
.starred-full-row .word-fr{font-size:.95rem;font-weight:700;color:var(--navy)}
.starred-full-row .word-en{font-size:.82rem;color:var(--text)}

/* STREAK */
.streak{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--navy);color:#fff;padding:.45rem .8rem;border-radius:18px;font-size:.78rem;font-weight:600;box-shadow:0 4px 12px rgba(27,58,107,.3);z-index:300;pointer-events:none;opacity:0;transform:translateY(10px);transition:all .25s}
.streak.pop{opacity:1;transform:translateY(0)}
@media(max-width:480px){.opts{grid-template-columns:1fr}.topic-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

let cQ = null, cTab = 'study', cIdx = 0, results = [], answered = false, streak = 0;

// ── SPEAK ──
function speakDirect(fr){
  // Strip parenthetical suffixes: Enchanté(e) → Enchanté, Grand(e) → Grand
  const clean = fr.replace(/\([^)]*\)/g, '').trim();
  // Check if adjective with slash: "Grand / Grande" → speak both with pause
  const parts = clean.split(/\s*\/\s*/);
  function playOne(word, onEnd){
    // Remove diacritics that confuse TTS (rare cases)
    const url='https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=fr&client=gtx&q='+encodeURIComponent(word);
    const audio=new Audio(url);
    let done=false;
    function fallback(){ if(done) return; done=true; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(word); const vs=window.speechSynthesis.getVoices(); const v=vs.find(v=>v.lang==='fr-FR')||vs.find(v=>v.lang==='fr-CA')||vs.find(v=>v.lang.startsWith('fr')); if(v) u.voice=v; u.lang='fr-FR'; u.rate=0.85; if(onEnd) u.onend=onEnd; window.speechSynthesis.speak(u); }
    audio.onended=()=>{ done=true; if(onEnd) onEnd(); };
    audio.onerror=fallback;
    const t=setTimeout(fallback,2000);
    const p=audio.play();
    if(p) p.then(()=>clearTimeout(t)).catch(()=>{ clearTimeout(t); fallback(); });
  }
  if(parts.length >= 2 && parts[1].trim()){
    // Adjective: play masculine, pause 600ms, play feminine
    playOne(parts[0].trim(), ()=>setTimeout(()=>playOne(parts[1].trim()), 600));
  } else {
    playOne(parts[0].trim());
  }
}
function speakData(btn){ speakDirect(btn.dataset.fr); }
function speak(fr){ speakDirect(fr); }
function starData(btn, context) {
  const fr = btn.dataset.fr;
  toggleStar(fr);
  const isNowStarred = starred.has(fr);
  btn.textContent = isNowStarred ? '⭐' : '☆';
  btn.classList.toggle('on', isNowStarred);
  if (context === 'starred') showStarred();
}

// ── HOME ──
function showHome() {
  cQ = null;
  const totalQ = QUIZZES.reduce((s, q) => s + q.questions.length, 0);
  const totalC = Object.values(scores).filter(v=>!isNaN(v?.correct)).reduce((s,v)=>s+(v.correct||0),0);
  const totalA = Object.values(scores).filter(v=>!isNaN(v?.total)).reduce((s,v)=>s+(v.total||0),0);
  const pct = totalA ? Math.round(totalC/totalA*100) : 0;
  const bar = Math.round(totalC/totalQ*100);
  const cards = QUIZZES.map((q,i)=>{
    const sc=scores[i]; const p=sc?Math.round(sc.correct/sc.total*100):null; const b=sc?Math.round(sc.correct/q.questions.length*100):0;
    return `<div class="tcard${sc&&sc.total===q.questions.length?' done':''}" onclick="openTopic(${i})">
      ${p!==null?`<span class="tcard-score">${p}%</span>`:''}
      <div class="tcard-title">${q.title}</div>
      <div class="tcard-meta">${q.questions.length} words</div>
      <div class="tcard-pb"><div class="tcard-pb-fill" style="width:${b}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('app').innerHTML = `
    <div class="home">
      <div class="summary-card">
        <div style="flex:1">
          <div class="summary-big">${totalC} / ${totalQ}</div>
          <div class="summary-sub">correct answers overall</div>
          <div class="pbar-wrap"><div class="pbar" style="width:${bar}%"></div></div>
        </div>

        <div class="sec-label" style="margin-bottom:0">Choose a topic to start</div>
        <button onclick="showStarred()" style="background:none;border:1.5px solid #E6A800;color:#B8860B;padding:.3rem .75rem;border-radius:15px;font-size:.78rem;font-weight:600;cursor:pointer">⭐ My starred words</button>
      </div>
      <div class="topic-grid">${cards}</div>
    </div>`;
}

function openTopic(idx) { cQ = idx; cTab = 'study'; showStudy(); }

function tabBar(active) {
  const sc = scores[cQ]; const tp = scores[cQ+'t'];
  const qp = sc ? ` · ${Math.round(sc.correct/sc.total*100)}%` : '';
  const pp = tp ? ` · ${Math.round(tp.correct/tp.total*100)}%` : '';
  return `<div class="tabs">
    <div class="tab${active==='study'?' active':''}" onclick="cTab='study';showStudy()">📖 Study</div>
    <div class="tab${active==='type'?' active':''}" onclick="cTab='type';startType()">⌨️ Type${pp}</div>
    <div class="tab${active==='quiz'?' active':''}" onclick="cTab='quiz';startQuiz()">✏️ Quiz${qp}</div>
  </div>`;
}

  const q = QUIZZES[cQ];

function clearStars() {
  QUIZZES[cQ].questions.forEach(it => starred.delete(it.fr));

}

// ── TYPE ──
function startType() { cTab='type'; cIdx=0; results=[]; typeAnswered=false; hintCount=0; renderType(); }

function renderType() {
  const q = QUIZZES[cQ];
  if (cIdx >= q.questions.length) { showTypeFinish(); return; }
  const it = q.questions[cIdx];
  const total = q.questions.length;
  const dots = q.questions.map((_,i)=>{
    const c = i<cIdx?(results[i]==='ok'?'ok':results[i]==='skip'?'':'err'):i===cIdx?'cur':'';
    return `<div class="pdot ${c}"></div>`;
  }).join('');

  // Conjugation table HTML
  const conjHtml = it.conj && it.conj.length ? `
    <div class="conj-box">
      <div class="conj-title">Présent de l'indicatif — ${it.fr}</div>
      <div class="conj-grid">
        ${PROS.map((p,i)=>`<span class="conj-pro">${p}</span><span class="conj-form">${it.conj[i]}</span>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="screen-hdr">
        <button class="back-btn" onclick="showStudy()">←</button>
        <div class="screen-title">${q.title} — Type</div>
        <div class="screen-badge">${cIdx+1} / ${total}</div>
      </div>
      ${tabBar('type')}
      <div class="prog-row">${dots}</div>
      <div class="type-card">
        ${it.emoji?`<span class="t-emoji">${it.emoji}</span>`:''}
        <div class="t-prompt">Type the French word for:</div>
        <div class="t-meaning">${it.meaning}</div>
        ${it.gender ? `<div class="t-gender">${it.gender==='m'?'→ le / un …':'→ la / une …'}</div>` : ''}
        <input class="t-input" id="tinp" type="text" autocomplete="off" autocorrect="off"
          spellcheck="false" placeholder="Type in French…"
          oninput="checkType(this)" onkeydown="if(event.key==='Enter')nextType()">
        <div class="acc-kb">
          ${['é','è','ê','ë','à','â','î','ï','ô','ù','û','ü','ç','œ','æ'].map(c=>`<button class="acc" onclick="insertAcc('${c}')">${c}</button>`).join('')}
        </div>
        <div class="t-fb" id="tfb"></div>
        <div class="t-actions">
          <button class="speak-btn" style="opacity:.5;font-size:.95rem" data-fr="${it.fr.replace(/"/g,'&quot;')}" onclick="speakData(this)">🔊 hear it</button>
          <button class="hint-btn" onclick="showHint()">💡 hint</button>
          <button class="skip-btn" onclick="skipType()">Skip →</button>
        </div>
        ${conjHtml}
      </div>
      <button class="next-btn show" id="tnext" style="display:none" onclick="nextType()">${cIdx+1<total?'Next →':'See results →'}</button>
    </div>`;
  document.getElementById('tinp').focus();
}

function insertAcc(c) {
  const inp = document.getElementById('tinp');
  if (!inp) return;
  const s = inp.selectionStart, e = inp.selectionEnd;
  inp.value = inp.value.slice(0,s) + c + inp.value.slice(e);
  inp.selectionStart = inp.selectionEnd = s+1;
  inp.focus(); checkType(inp);
}

function norm(s) {
  return s.trim().toLowerCase()
    .replace(/[àáâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[îï]/g,'i')
    .replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c').replace(/[œ]/g,'oe');
}

function checkType(inp) {
  if (typeAnswered) return;
  const it = QUIZZES[cQ].questions[cIdx];
  const typed = norm(inp.value), correct = norm(it.fr);
  const fb = document.getElementById('tfb');
  if (typed === correct) {
    inp.classList.add('right'); inp.classList.remove('wrong');
    fb.className='t-fb ok'; fb.textContent='✅ Correct!  ' + it.fr;
    typeAnswered=true; results[cIdx]='ok';
    document.getElementById('tnext').style.display='block';
    speakDirect(it.fr);
  } else if (correct.startsWith(typed) && typed.length>0) {
    inp.classList.remove('wrong'); fb.className='t-fb'; fb.textContent='';
  } else if (typed.length>=2) {
    inp.classList.add('wrong'); inp.classList.remove('right');
  }
}

function showHint() {
  if (typeAnswered) return;
  hintCount++;
  const it = QUIZZES[cQ].questions[cIdx];
  const reveal = Math.min(hintCount*2, it.fr.length);
  document.getElementById('tfb').className='t-fb';
  document.getElementById('tfb').textContent='💡 ' + it.fr.slice(0,reveal) + '…';
  document.getElementById('tinp').focus();
}

function skipType() {
  if (typeAnswered) { nextType(); return; }
  const it = QUIZZES[cQ].questions[cIdx];
  results[cIdx]='skip';
  const inp = document.getElementById('tinp');
  inp.value=it.fr; inp.classList.add('wrong');
  const isS = starred.has(it.fr);
  document.getElementById('tfb').className='t-fb bad';
  const starBtn = `<button id="skip-star-btn" style="background:none;border:1px solid #E6A800;border-radius:6px;padding:2px 7px;cursor:pointer;font-size:.75rem;color:#B8860B">${isS?'⭐ Starred':'☆ Star'}</button>`;
  document.getElementById('tfb').innerHTML=`👀 <strong>${it.fr}</strong> &nbsp;${starBtn}`;
  document.getElementById('skip-star-btn').addEventListener('click', function(){
    toggleStar(it.fr);
    this.textContent = starred.has(it.fr) ? '⭐ Starred' : '☆ Star';
  });
  typeAnswered=true;
  document.getElementById('tnext').style.display='block';
}

function nextType() { cIdx++; typeAnswered=false; hintCount=0; renderType(); }

function showTypeFinish() {
  const q=QUIZZES[cQ], correct=results.filter(r=>r==='ok').length, total=q.questions.length;
  const pct=Math.round(correct/total*100);
  scores[cQ+'t']={correct,total}; save();
  const em=pct>=80?'🏆':pct>=60?'😊':'💪';
  const wrongs=results.map((r,i)=>({r,it:q.questions[i]})).filter(x=>x.r!=='ok');
  document.getElementById('app').innerHTML=`
    <div class="finish"><div class="fcard">
      <div class="f-emoji">${em}</div>
      <div class="f-score">${correct} / ${total}</div>
      <div class="f-msg">${pct}% — ${pct>=80?'Excellent spelling!':pct>=60?'Good effort! Keep practising.':'Review the words and try again.'}</div>
      <div class="f-btns">
        <button class="btn-p" onclick="startType()">🔄 Try again</button>
        <button class="btn-p" style="background:var(--navy)" onclick="startQuiz()">✏️ Take quiz</button>
        <button class="btn-s" onclick="showStudy()">📖 Study list</button>
      </div>
      ${wrongs.length?`<div class="rev-list"><div class="rev-lbl">To review (${wrongs.length})</div>
        ${wrongs.map(x=>`<div class="rev-item"><span class="rev-em">${x.it.emoji||'📝'}</span>
          <div><div class="rev-fr">${x.it.fr}</div><div class="rev-en">${x.it.meaning}</div></div></div>`).join('')}
      </div>`:'<p style="color:var(--p);font-weight:600;margin:.5rem 0">Perfect! 🎉</p>'}
    </div></div>`;
}

function startQuiz() { cTab='quiz'; cIdx=0; results=[]; answered=false; streak=0; renderQuiz(); }

function renderQuiz() {
  const q=QUIZZES[cQ], it=q.questions[cIdx], total=q.questions.length;
  const dots=q.questions.map((_,i)=>{
    const c=i<cIdx?(results[i]?'ok':'err'):i===cIdx?'cur':'';
    return `<div class="pdot ${c}"></div>`;
  }).join('');
  const opts=it.opts.map((o,i)=>`<button class="opt" onclick="answer(this,${i},${it.correct})">${o}</button>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="screen">
      <div class="screen-hdr">
        <button class="back-btn" onclick="showStudy()">←</button>

        ${it.emoji?`<span class="q-emoji">${it.emoji}</span>`:''}
        <div class="q-label">What does this mean?</div>

        ${it.gender ? `<div class="q-gender">${it.gender==='m'?'le / un':'la / une'}</div>` : ''}
        <div class="opts">${opts}</div>
        <div class="fb" id="fb"></div>
      </div>
      <button class="next-btn" id="nb" onclick="nextQ()">${cIdx+1<total?'Next →':'See results →'}</button>
    </div>`;
}

function answer(btn,chosen,correct) {
  if (answered) return;
  answered=true;
  const ok=chosen===correct;
  if(ok) streak++; else streak=0;
  results.push(ok);
  document.querySelectorAll('.opt').forEach((b,i)=>{
    if(i===correct) b.classList.add('correct');
    else if(b===btn&&!ok) b.classList.add('wrong');
    else b.classList.add('reveal');
    b.disabled=true;
  });
  const it=QUIZZES[cQ].questions[cIdx];
  const fb=document.getElementById('fb');
  fb.className=`fb show ${ok?'ok':'bad'}`;
  fb.innerHTML=ok?`✅ <strong>Correct!</strong> "${it.fr}" = ${it.meaning}`
    :`❌ The answer is: <strong>${it.opts[correct]}</strong> — "${it.fr}" = ${it.meaning}`;
  if(streak>=3){
    const el=document.getElementById('streak');
    el.textContent=streak>=10?`🔥 ${streak} in a row!`:streak>=5?`⚡ ${streak} correct!`:`🎯 ${streak} in a row!`;
    el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),2000);
  }
  document.getElementById('nb').classList.add('show');
}

function nextQ() { answered=false; cIdx++; cIdx>=QUIZZES[cQ].questions.length?showQuizFinish():renderQuiz(); }

function showQuizFinish() {
  const q=QUIZZES[cQ], correct=results.filter(Boolean).length, total=q.questions.length;
  const pct=Math.round(correct/total*100);
  scores[cQ]={correct,total}; save();
  const em=pct>=80?'🏆':pct>=60?'😊':'💪';
  const wrongs=results.map((r,i)=>({r,it:q.questions[i]})).filter(x=>!x.r);
  document.getElementById('app').innerHTML=`
    <div class="finish"><div class="fcard">
      <div class="f-emoji">${em}</div>
      <div class="f-score">${correct} / ${total}</div>
      <div class="f-msg">${pct}% — ${pct>=80?'Excellent! Keep it up!':pct>=60?'Good job! A little more practice.':'Review the words first, then try again.'}</div>
      <div class="f-btns">
        <button class="btn-p" onclick="startQuiz()">🔄 Try again</button>
        <button class="btn-p" style="background:var(--navy)" onclick="showStudy()">📖 Review words</button>
        <button class="btn-s" onclick="showHome()">🏠 All topics</button>
      </div>
      ${wrongs.length?`<div class="rev-list"><div class="rev-lbl">Words to review (${wrongs.length})</div>
        ${wrongs.map(x=>`<div class="rev-item"><span class="rev-em">${x.it.emoji||'📝'}</span>
          <div><div class="rev-fr">${x.it.fr}</div><div class="rev-en">= ${x.it.meaning}</div></div></div>`).join('')}
      </div>`:'<p style="color:var(--p);font-weight:600;margin:.5rem 0">Perfect score! 🎉</p>'}
    </div></div>`;
}

showHome();
</script>
</body>
</html>
